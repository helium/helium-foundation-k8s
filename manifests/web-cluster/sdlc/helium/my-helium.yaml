apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: my-helium
  name: my-helium
  namespace: helium
spec:
  selector:
    matchLabels:
      app: my-helium
  template:
    metadata:
      labels:
        app: my-helium
        security-group: public-rds-access
    spec:
      serviceAccountName: public-monitoring-rds-monitoring-user-access
      containers:
        - name: my-helium
          image: public.ecr.aws/v0j6k5v6/my-helium:0.2.51
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: NEXT_RUNTIME
              value: "nodejs"
            - name: NODE_ENV
              value: "production"
            - name: SOLANA_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: helius-rpc-url
                  key: secret
            - name: PG_HOST
              value: monitoring-rds.cnigyps3bpgz.us-east-1.rds.amazonaws.com
            - name: PG_PORT
              value: "5432"
            - name: PG_USER
              value: monitoring
            - name: AWS_REGION
              value: us-east-1
            - name: PG_NAME
              value: monitoring
            - name: NEXT_PUBLIC_WORLD_HELIUM_URL
              value: https://world-beta.helium.com
            - name: NEXT_PUBLIC_PRIVY_APP_ID
              valueFrom:
                secretKeyRef:
                  name: privy-app-id
                  key: app-id
            - name: NEXT_PUBLIC_SOLANA_CLUSTER
              value: devnet
            - name: HPL_CRONS_TASK_QUEUE
              value: H39gEszvsi6AT4rYBiJTuZHJSF5hMHy6CKGTd7wzhsg7
            - name: FEE_PAYER_WALLET_PATH
              value: /usr/src/app/keys/keypair.json
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: sentry-dsn
                  key: secret
            - name: ACCOUNT_INDEXER_URL
              value: "https://account-sink.web.test-helium.com"
            - name: ASSET_OWNER_INDEXER_URL
              value: "https://asset-ownership.web.test-helium.com"
            - name: ACCOUNT_INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: refresh-password
                  key: password
            - name: ASSET_OWNER_INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: refresh-password
                  key: password
            - name: BRIDGE_API_URL
              value: "https://api.sandbox.bridge.xyz/v0"
            - name: BRIDGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bridge-api-key
                  key: secret
            - name: PRIVY_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: privy-app-secret
                  key: secret
            - name: ORACLE_SIGNER
              value: dor5y9KAG6mVGFquXr8ipmm7GVLZefiNiCjvER58kPB
            - name: ORACLE_URL
              value: https://hnt-rewards.oracle.test-helium.com
            - name: JUPITER_API_URL
              value: "https://api.jup.ag"
            - name: JUPITER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: jupiter-api-key
                  key: jupiter-api-key
            - name: ORACLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: unlimited-rate-api-key
                  key: secret
            - name: ONBOARDING_ENDPOINT
              value: "https://onboarding.web.test-helium.com/api/v3"
            - name: MIGRATION_ALLOWLIST_PATH
              value: /usr/src/app/config/migration-allowlist.json

          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 2
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: 3000
            timeoutSeconds: 1
          volumeMounts:
            - name: my-helium-keypair
              mountPath: /usr/src/app/keys
              readOnly: true
            - name: my-helium-migration-allowlist
              mountPath: /usr/src/app/config
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 1200Mi
            limits:
              cpu: 1000m
              memory: 2000Mi
      volumes:
        - name: my-helium-keypair
          secret:
            secretName: my-helium-keypair
            items:
              - key: keypair.json
                path: keypair.json
        - name: my-helium-migration-allowlist
          configMap:
            name: my-helium-migration-allowlist
            items:
              - key: migration-allowlist.json
                path: migration-allowlist.json
---
apiVersion: v1
kind: Service
metadata:
  name: my-helium
  namespace: helium
spec:
  ports:
    - port: 3000
      protocol: TCP
      targetPort: http
  selector:
    app: my-helium
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-helium
  namespace: helium
  annotations:
    # Rate limiting with API key bypass
    # The map and limit_req_zone are defined in ingress-nginx ConfigMap (http-snippet)
    # API keys loaded from /etc/nginx/unlimited-rate-api-keys/*.conf (mounted from sealed secret)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      limit_req zone=blockchain_api_limit burst=100 nodelay;
spec:
  ingressClassName: nginx
  rules:
    - host: my-helium.web.test-helium.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-helium
                port:
                  number: 3000
    - host: blockchain-api.web.test-helium.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-helium
                port:
                  number: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: my-helium
  namespace: helium
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-helium
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
